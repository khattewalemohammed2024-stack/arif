<!DOCTYPE html>
<html>
<head>
    <title>Hello World using JavaScript</title>

    <style>
        body {
            text-align: center;
            font-family: Arial, sans-serif;
        }

        button {
            padding: 10px 15px;
            font-size: 16px;
            margin-top: 20px;
        }

        table {
            margin: 20px auto;
            border-collapse: collapse;
            width: 60%;
        }

        th, td {
            border: 1px solid black;
            padding: 10px;
        }

        th {
            background-color: lightgray;
        }
    </style>

    <script>
        function showMessage() {
            var element = document.getElementById("message");

            element.outerHTML = "<h2 id='message'>Hello, world!</h2>";
        }
    </script>

</head>
<body>

    <!-- Student Details -->
    <p><strong>Name:</strong> K.MOHAMMED ARIF</p>
    <p><strong>Reg No:</strong> 24BCE2604</p>
    <hr>

    <h1>JavaScript Hello World Example</h1>

    <button onclick="showMessage()">Click Me</button>

    <p id="message"></p>

    <!-- Table -->
    <table>
        <tr>
            <th>List of tags</th>
            <th>Description</th>
        </tr>
        <tr>
            <td>&lt;button&gt;</td>
            <td>Creates a clickable button</td>
        </tr>
        <tr>
            <td>&lt;script&gt;</td>
            <td>Defines JavaScript code</td>
        </tr>
        <tr>
            <td>getElementById()</td>
            <td>Selects an element using its ID</td>
        </tr>
        <tr>
            <td>outerHTML</td>
            <td>Replaces the entire HTML element</td>
        </tr>
    </table>

</body>
</html>
