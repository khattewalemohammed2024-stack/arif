<!DOCTYPE html>
<html>
<head>
    <title>Overlapping Image Gallery</title>

    <style>
        body {
            text-align: center;
            font-family: Arial;
        }

        .container {
            position: relative;
            width: 400px;
            height: 300px;
            margin: auto;
        }

        img {
            width: 150px;
            height: 150px;
            position: absolute;
            cursor: pointer;
            border: 2px solid black;
        }

        #img1 { top: 20px; left: 20px; }
        #img2 { top: 60px; left: 80px; }
        #img3 { top: 100px; left: 140px; }
    </style>

    <script>
        var topIndex = 1; // global variable

        function bringToFront(element) {
            element.style.zIndex = ++topIndex;
        }
    </script>

</head>
