<!DOCTYPE html>
<html>
<head>
    <title>Area of Rectangle</title>

    <script>
        function calculateArea() {

            // Get user input
            var length = document.getElementById("length").value;
            var width = document.getElementById("width").value;

            // Integer calculation
            var areaInt = parseInt(length) * parseInt(width);

            // Float calculation
            var areaFloat = parseFloat(length) * parseFloat(width);

            document.getElementById("result").innerHTML =
                "Integer Area: " + areaInt + "<br>" +
                "Float Area: " + areaFloat;
        }
    </script>

    <style>
        body {
            text-align: center;
            font-family: Arial;
        }

        input, button {
            padding: 8px;
            margin: 5px;
        }
    </style>

</head>
<body>

    <!-- Student Details -->
    <p><strong>Name:</strong> K.MOHAMMED ARIF</p>
    <p><strong>Reg No:</strong> 24BCE2604</p>
    <hr>

    <h2>Rectangle Area Calculator</h2>

    <input type="text" id="length" placeholder="Enter Length">
    <input type="text" id="width" placeholder="Enter Width">
    <br>

    <button onclick="calculateArea()">Calculate Area</button>

    <p id="result"></p>

</body>
</html>
