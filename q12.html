<!DOCTYPE html>
<html>
<head>
    <title>Job Skills Form</title>

    <script>
        function validateSkills() {

            var skills = document.getElementsByName("skill");
            var selected = [];

            for (var i = 0; i < skills.length; i++) {
                if (skills[i].checked) {
                    selected.push(skills[i].value);
                }
            }

            if (selected.length < 3) {
                document.getElementById("output").innerHTML =
                    "Please select at least 3 skills!";
            } else {
                document.getElementById("output").innerHTML =
                    "Selected Skills: " + selected.join(", ");
            }
        }
    </script>

    <style>
        body {
            text-align: center;
            font-family: Arial;
        }

        input, button {
            margin: 10px;
        }
    </style>

</head>
<body>

    <!-- Student Details -->
    <p><strong>Name:</strong> K.MOHAMMED ARIF</p>
    <p><strong>Reg No:</strong> 24BCE2604</p>
    <hr>

    <h2>Select Your Skills</h2>

    <input type="checkbox" name="skill" value="Java"> Java
    <input type="checkbox" name="skill" value="Python"> Python
    <input type="checkbox" name="skill" value="HTML"> HTML
    <input type="checkbox" name="skill" value="CSS"> CSS
    <input type="checkbox" name="skill" value="JavaScript"> JavaScript
    <br>

    <button onclick="validateSkills()">Submit</button>

    <p id="output"></p>

</body>
</html>
