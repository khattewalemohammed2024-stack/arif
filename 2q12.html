<!DOCTYPE html>
<html>
<head>
    <title>Student Registration Portal</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: skyblue;
        }

        /* Header */
        .header {
            text-align: center;
            padding: 20px;
        }

        /* Navigation Bar */
        .navbar {
            background-color: #222;
            padding: 10px;
            text-align: center;
            border-radius: 10px;
            width: 90%;
            margin: auto;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
        }

        .navbar a:hover {
            color: yellow;
        }

        /* Form Container */
        .container {
            width: 90%;
            margin: 20px auto;
        }

        .section {
            background-color: #222;
            color: white;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 10px;
        }

        .section input, .section select {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
            border-radius: 5px;
            border: none;
        }

        .submit-btn {
            background-color: green;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 5px;
            width: 100%;
            font-size: 16px;
            cursor: pointer;
        }

        .submit-btn:hover {
            background-color: darkgreen;
        }

        .student-details {
            text-align: left;
            padding: 10px;
        }
    </style>
</head>

<body>

<div class="student-details">
    <strong>Name:</strong> K.MOHAMMED ARIF <br>
    <strong>Reg No:</strong> 24BCE2604
</div>

<div class="header">
    <h1>Student Registration Portal</h1>
</div>

<div class="navbar">
    <a href="#personal">Personal</a>
    <a href="#academic">Academic</a>
    <a href="#address">Address</a>
    <a href="#account">Account</a>
</div>

<div class="container">

<form onsubmit="alert('Form Submitted Successfully!')">

    <!-- Section 1 -->
    <div class="section" id="personal">
        <h2>Personal Information</h2>
        <input type="text" placeholder="Full Name" required>
        <input type="date" required>

        <select required>
            <option value="">Select Gender</option>
            <option>Male</option>
            <option>Female</option>
        </select>

        <input type="email" placeholder="Email Address" required>
        <input type="text" placeholder="Mobile Number" required>
    </div>

    <!-- Section 2 -->
    <div class="section" id="academic">
        <h2>Academic Details</h2>
        <input type="text" placeholder="Register Number" required>
        <input type="text" placeholder="Degree Program" required>
        <input type="text" placeholder="Department" required>
        <input type="text" placeholder="Year of Study" required>
    </div>

    <!-- Section 3 -->
    <div class="section" id="address">
        <h2>Address Information</h2>
        <input type="text" placeholder="Door Number" required>
        <input type="text" placeholder="Street Name" required>
        <input type="text" placeholder="City" required>
        <input type="text" placeholder="State" required>
        <input type="text" placeholder="Pincode" required>
    </div>

    <!-- Section 4 -->
    <div class="section" id="account">
        <h2>Account Credentials</h2>
        <input type="text" placeholder="Username" required>
        <input type="password" placeholder="Password" required>
        <input type="password" placeholder="Confirm Password" required>

        <button type="submit" class="submit-btn">Submit</button>
    </div>

</form>

</div>

</body>
</html>
