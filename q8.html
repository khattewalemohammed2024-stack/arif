<!DOCTYPE html>
<html>
<head>
    <title>Multiplication Table (Do-While)</title>

    <script>
        function printTable() {

            var n = parseInt(document.getElementById("num").value);
            var i = 1;
            var result = "";

            do {
                result += n + " x " + i + " = " + (n * i) + "<br>";
                i++;
            } while (i <= 10);

            document.getElementById("output").innerHTML = result;
        }
    </script>

    <style>
        body {
            text-align: center;
            font-family: Arial;
        }

        input, button {
            padding: 8px;
            margin: 5px;
        }
    </style>

</head>
<body>

    <!-- Student Details -->
    <p><strong>Name:</strong> K.MOHAMMED ARIF</p>
    <p><strong>Reg No:</strong> 24BCE2604</p>
    <hr>

    <h2>Multiplication Table using Do-While Loop</h2>

    <input type="number" id="num" placeholder="Enter Number">
    <br>

    <button onclick="printTable()">Generate Table</button>

    <p id="output"></p>

</body>
</html>
