</head>
<body>

    <!-- Student Details -->
    <p><strong>Name:</strong>K.MOHAMMED ARIF</p>
    <p><strong>Reg No:</strong>24BCE2604</p>
    <hr>

    <h1>Line Break and Horizontal Line Example</h1>

    <!-- Paragraph with two line breaks -->
    <p>
        This is the first line of the paragraph.<br>
        This is the second line after one line break.<br>
        This is the third line after two line breaks.
    </p>

    <!-- Horizontal Line -->
    <hr>

    <!-- Another Paragraph -->
    <p>
        This is another paragraph displayed after the horizontal line.
    </p>
